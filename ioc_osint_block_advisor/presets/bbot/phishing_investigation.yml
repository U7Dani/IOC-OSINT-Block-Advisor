# IOC OSINT Block Advisor configuration artifact (MIT). See NOTICE_BBOT.md.
# Lookalike-domain / certificate / historical-content enrichment aimed at
# phishing-infrastructure triage. Use "authorized_active" if you need to
# actually browse/screenshot the URL.
#
# NOTE: this preset's no-active-contact behavior is NOT code-enforced (no
