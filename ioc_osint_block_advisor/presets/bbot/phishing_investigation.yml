# Full BBOT / custom presets.

description: "Investigación de phishing - dominios similares, certificados, contenido histórico"

include:
  - subdomain-enum

exclude_modules:
  - portscan
  - nuclei
  - http
  - gowitness
  - webbrute
  - webbrute_shortnames

output_modules:
  - json
